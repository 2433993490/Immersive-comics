<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comic Translator</title>
    <style>
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #0f172a;
        color: #e2e8f0;
        width: 320px;
      }
      .wrap {
        padding: 14px;
      }
      h1 {
        font-size: 15px;
        margin: 0 0 10px;
      }
      p {
        font-size: 12px;
        color: #94a3b8;
      }
      button {
        width: 100%;
        margin-top: 8px;
        border: none;
        border-radius: 10px;
        padding: 10px;
        font-size: 13px;
        cursor: pointer;
      }
      .primary {
        background: linear-gradient(135deg, #2563eb, #7c3aed);
        color: #fff;
      }
      .secondary {
        background: #1e293b;
        color: #e2e8f0;
      }
      #status {
        min-height: 18px;
        margin-top: 8px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <h1>漫画沉浸式翻译</h1>
      <p>默认 Google 翻译，支持 OCR / AI / 翻译 API 自定义。</p>
      <button id="scanBtn" class="primary">扫描当前页面图片</button>
      <button id="clearBtn" class="secondary">清除覆盖层</button>
      <button id="settingsBtn" class="secondary">打开设置页</button>
      <div id="status"></div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
