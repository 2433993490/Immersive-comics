<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comic Translator</title>
    <style>
      :root {
        --popup-footer-background-color: #e8eaeb;
        --popup-content-background-color: #ffffff;
        --popup-item-background-color: #f3f5f6;
        --text-black-2: #1f1f1f;
        --text-gray-2: #6b7280;
        --muted-border-color: #d8dde3;
        --primary: #ec4899;
      }

      body {
        padding: 0;
        margin: 0 auto;
        min-width: 316px;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: var(--popup-footer-background-color);
        color-scheme: light;
      }

      .popup-container {
        width: 316px;
        min-width: 316px;
        background-color: var(--popup-footer-background-color);
      }

      .popup-card {
        border: 1px solid var(--muted-border-color);
        border-radius: 12px;
        overflow: hidden;
      }

      .popup-content {
        background-color: var(--popup-content-background-color);
        border-radius: 0 0 12px 12px;
        padding: 16px;
      }

      .lang-row {
        display: grid;
        grid-template-columns: 1fr 24px 1fr;
        gap: 8px;
        align-items: center;
        margin-bottom: 10px;
      }

      .lang-block {
        background: var(--popup-item-background-color);
        border-radius: 12px;
        padding: 7px;
      }

      .lang-block label {
        display: block;
        font-size: 11px;
        color: var(--text-gray-2);
        margin-top: 4px;
      }

      select {
        width: 100%;
        border: none;
        background: transparent;
        font-size: 14px;
        color: var(--text-black-2);
      }

      select option {
        color: #111827;
        background: #ffffff;
      }

      .arrow {
        color: #9ca3af;
        text-align: center;
        font-size: 18px;
      }

      .field {
        margin-top: 6px;
      }

      .field label {
        font-size: 12px;
        color: #4b5563;
      }

      .select-wrap {
        margin-top: 4px;
        border-radius: 8px;
        border: 1px solid #e4e7eb;
        background: var(--popup-item-background-color);
        padding: 6px 8px;
      }

      .primary {
        width: 100%;
        margin-top: 10px;
        border: none;
        border-radius: 12px;
        height: 48px;
        font-size: 16px;
        font-weight: 700;
        cursor: pointer;
        background: var(--primary);
        color: #fff;
      }

      .popup-footer {
        background-color: var(--popup-footer-background-color);
        min-height: 40px;
        display: flex;
        gap: 8px;
        align-items: center;
        padding: 6px 10px 8px;
      }

      .secondary {
        flex: 1;
        border: 1px solid #d6dae0;
        border-radius: 8px;
        padding: 6px 8px;
        background: #fff;
        color: #4b5563;
        font-size: 12px;
        cursor: pointer;
      }

      #status {
        min-height: 18px;
        margin-top: 8px;
        font-size: 12px;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <div class="popup-container">
      <div class="popup-card">
        <div class="popup-content">
          <div class="lang-row">
            <div class="lang-block">
              <select id="sourceLang">
                <option value="auto">自动检测</option>
                <option value="en">英语</option>
                <option value="ja">日语</option>
                <option value="ko">韩语</option>
                <option value="zh-CN">简体中文</option>
              </select>
              <label>源语言</label>
            </div>
            <div class="arrow">→</div>
            <div class="lang-block">
              <select id="targetLang">
                <option value="zh-CN">简体中文</option>
                <option value="zh-TW">繁體中文</option>
                <option value="en">英语</option>
                <option value="ja">日语</option>
              </select>
              <label>目标语言</label>
            </div>
          </div>

          <div class="field">
            <label for="translatorProvider">翻译服务</label>
            <div class="select-wrap"><select id="translatorProvider"></select></div>
          </div>

          <button id="scanBtn" class="primary">翻译 (Alt+A)</button>
          <div id="status"></div>
        </div>

        <div class="popup-footer">
          <button id="clearBtn" class="secondary">清除覆盖层</button>
          <button id="settingsBtn" class="secondary">设置</button>
        </div>
      </div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
