<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comic Translator</title>
    <style>
      body {
        margin: 0;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        background: #eef0f4;
        color: #1f2937;
        width: 320px;
      }
      .wrap {
        padding: 12px;
      }
      .panel {
        background: #f3f4f6;
        border: 1px solid #e5e7eb;
        border-radius: 18px;
        padding: 12px;
      }
      .lang-row {
        display: grid;
        grid-template-columns: 1fr 24px 1fr;
        gap: 8px;
        align-items: center;
        margin-bottom: 10px;
      }
      .lang-block {
        background: #e5e7eb;
        border-radius: 12px;
        padding: 7px;
      }
      .lang-block label {
        display: block;
        font-size: 11px;
        color: #6b7280;
        margin-top: 4px;
      }
      select {
        width: 100%;
        border: none;
        background: transparent;
        font-size: 14px;
        color: #111827;
      }
      .arrow {
        color: #9ca3af;
        text-align: center;
        font-size: 18px;
      }
      .field {
        margin-top: 6px;
      }
      .field label {
        font-size: 12px;
        color: #4b5563;
      }
      .select-wrap {
        margin-top: 4px;
        border-radius: 10px;
        border: 1px solid #e5e7eb;
        background: #fff;
        padding: 6px 8px;
      }
      .toggle-row {
        margin-top: 8px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        font-size: 14px;
      }
      .switch {
        position: relative;
        width: 38px;
        height: 22px;
      }
      .switch input {
        opacity: 0;
        width: 0;
        height: 0;
      }
      .slider {
        position: absolute;
        inset: 0;
        background: #d1d5db;
        border-radius: 999px;
        transition: 0.2s;
      }
      .slider:before {
        content: "";
        position: absolute;
        width: 16px;
        height: 16px;
        left: 3px;
        top: 3px;
        background: #fff;
        border-radius: 50%;
        transition: 0.2s;
      }
      .switch input:checked + .slider {
        background: #ec4899;
      }
      .switch input:checked + .slider:before {
        transform: translateX(16px);
      }
      .primary {
        width: 100%;
        margin-top: 12px;
        border: none;
        border-radius: 12px;
        padding: 10px;
        font-size: 22px;
        cursor: pointer;
        background: #ec4899;
        color: #fff;
      }
      .foot {
        margin-top: 10px;
        display: flex;
        gap: 8px;
      }
      .secondary {
        flex: 1;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 8px;
        background: #fff;
        color: #374151;
        cursor: pointer;
      }
      #status {
        min-height: 18px;
        margin-top: 8px;
        font-size: 12px;
        color: #6b7280;
      }
    </style>
  </head>
  <body>
    <div class="wrap">
      <div class="panel">
        <div class="lang-row">
          <div class="lang-block">
            <select id="sourceLang">
              <option value="auto">自动检测</option>
              <option value="en">英语</option>
              <option value="ja">日语</option>
              <option value="ko">韩语</option>
              <option value="zh-CN">简体中文</option>
            </select>
            <label>源语言</label>
          </div>
          <div class="arrow">→</div>
          <div class="lang-block">
            <select id="targetLang">
              <option value="zh-CN">简体中文</option>
              <option value="zh-TW">繁體中文</option>
              <option value="en">英语</option>
              <option value="ja">日语</option>
            </select>
            <label>目标语言</label>
          </div>
        </div>

        <div class="field">
          <label for="translatorProvider">翻译服务</label>
          <div class="select-wrap"><select id="translatorProvider"></select></div>
        </div>

        <button id="scanBtn" class="primary">翻译 (Alt+A)</button>
        <div id="status"></div>
      </div>
      <div class="foot">
        <button id="clearBtn" class="secondary">清除覆盖层</button>
        <button id="settingsBtn" class="secondary">设置</button>
      </div>
    </div>
    <script type="module" src="popup.js"></script>
  </body>
</html>
