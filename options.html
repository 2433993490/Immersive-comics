<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comic Translator Settings</title>
    <style>
      body {
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        padding: 16px;
        background: #f3f4f6;
        color: #0f172a;
      }
      h1 {
        margin-top: 0;
        font-size: 22px;
      }
      .card {
        background: #ffffff;
        border: 1px solid #e2e8f0;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }
      label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        color: #334155;
      }
      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #fff;
        color: #0f172a;
        padding: 8px;
        margin-bottom: 10px;
        font-size: 13px;
        box-sizing: border-box;
      }
      textarea {
        min-height: 78px;
        resize: vertical;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      button {
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        background: #ec4899;
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      #msg {
        margin-left: 10px;
        color: #16a34a;
      }
      .translate-layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        gap: 14px;
      }
      .provider-panel {
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        background: #f8fafc;
        overflow: hidden;
      }
      .provider-title {
        font-size: 14px;
        font-weight: 600;
        padding: 10px 12px;
        border-bottom: 1px solid #e5e7eb;
      }
      .provider-list {
        max-height: 420px;
        overflow: auto;
        padding: 8px;
      }
      .provider-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        width: 100%;
        border: 1px solid transparent;
        border-radius: 10px;
        background: transparent;
        color: #0f172a;
        padding: 8px 10px;
        margin-bottom: 6px;
        text-align: left;
      }
      .provider-item.active {
        background: #fdf2f8;
        border-color: #f9a8d4;
      }
      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: #cbd5e1;
      }
      .provider-item.active .dot {
        background: #ec4899;
      }
      .provider-form {
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 12px;
      }
    </style>
  </head>
  <body>
    <h1>漫画翻译设置</h1>

    <div class="card">
      <h3>通用语言</h3>
      <div class="row">
        <div>
          <label for="sourceLang">源语言</label>
          <input id="sourceLang" placeholder="auto / en / ja" />
        </div>
        <div>
          <label for="targetLang">目标语言</label>
          <input id="targetLang" placeholder="zh-CN" />
        </div>
      </div>
    </div>

    <div class="card">
      <h3>翻译 API</h3>
      <div class="translate-layout">
        <div class="provider-panel">
          <div class="provider-title">翻译服务列表</div>
          <div id="providerList" class="provider-list"></div>
        </div>
        <div class="provider-form">
          <label for="translatorProvider">翻译提供方</label>
          <select id="translatorProvider">
            <option value="google">Google (默认)</option>
            <option value="claude">Claude</option>
            <option value="deepl">Deepl</option>
            <option value="deepseek">DeepSeek</option>
            <option value="gemini">Gemini</option>
            <option value="openl">OpenL</option>
            <option value="azureOpenai">Open AI (Azure OpenAI)</option>
            <option value="azureTranslator">微软 Azure 翻译</option>
            <option value="aliyunBailian">阿里云百炼大模型</option>
            <option value="qwenMt">Qwen-MT</option>
            <option value="aliyunTranslate">阿里云翻译</option>
            <option value="baiduQianfan">百度千帆大模型</option>
            <option value="doubao">字节跳动豆包大模型</option>
            <option value="baiduTranslate">百度翻译</option>
            <option value="caiyun">彩云小译</option>
            <option value="volcengine">火山引擎</option>
            <option value="tencentTransmart">腾讯翻译君</option>
            <option value="niutrans">小牛翻译</option>
            <option value="youdao">有道翻译</option>
            <option value="youdaoLlm">有道子曰大模型翻译</option>
            <option value="custom">自定义接口翻译</option>
          </select>
          <label for="customTranslateEndpoint">自定义 API 接口地址</label>
          <input id="customTranslateEndpoint" placeholder="https://..." />
          <label for="customTranslateHeaders">Headers (每行 Key: Value)</label>
          <textarea id="customTranslateHeaders"></textarea>
          <label for="customTranslateBody">Body Template</label>
          <textarea id="customTranslateBody"></textarea>
          <label for="customTranslatePath">Response Path</label>
          <input id="customTranslatePath" placeholder="data.translation" />
        </div>
      </div>
    </div>

    <div class="card">
      <h3>AI 大模型 API（可选）</h3>
      <label>
        <input id="aiEnabled" type="checkbox" style="width:auto; margin-right:6px;" /> 启用 AI 润色
      </label>
      <label for="aiEndpoint">AI Endpoint</label>
      <input id="aiEndpoint" placeholder="https://..." />
      <div class="row">
        <div>
          <label for="aiKey">AI API Key</label>
          <input id="aiKey" type="password" />
        </div>
        <div>
          <label for="aiModel">AI Model</label>
          <input id="aiModel" placeholder="gpt-4o-mini / qwen-max ..." />
        </div>
      </div>
      <label for="aiHeaders">AI Headers</label>
      <textarea id="aiHeaders"></textarea>
      <label for="aiPrompt">Prompt Template</label>
      <textarea id="aiPrompt"></textarea>
      <label for="aiBody">Body Template</label>
      <textarea id="aiBody"></textarea>
      <label for="aiPath">Response Path</label>
      <input id="aiPath" placeholder="choices.0.message.content" />
    </div>

    <div class="card">
      <h3>OCR 源</h3>
      <label for="ocrProvider">OCR 提供方</label>
      <select id="ocrProvider">
        <option value="ocrspace">OCR.Space (默认)</option>
        <option value="custom">Custom</option>
      </select>
      <label for="ocrSpaceKey">OCR.Space Key</label>
      <input id="ocrSpaceKey" />

      <label for="customOcrEndpoint">Custom OCR Endpoint</label>
      <input id="customOcrEndpoint" placeholder="https://..." />
      <label for="customOcrHeaders">Custom OCR Headers</label>
      <textarea id="customOcrHeaders"></textarea>
      <label for="customOcrBody">Custom OCR Body Template</label>
      <textarea id="customOcrBody"></textarea>
      <label for="customOcrPath">Custom OCR Response Path（需返回数组）</label>
      <input id="customOcrPath" placeholder="data.lines" />
    </div>

    <button id="saveBtn">保存设置</button><span id="msg"></span>

    <script type="module" src="options.js"></script>
  </body>
</html>
