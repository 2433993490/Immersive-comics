<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Comic Translator Settings</title>
    <style>
      :root {
        --bg: #f3f4f6;
        --panel: #ffffff;
        --text: #1f2937;
        --muted: #6b7280;
        --border: #e5e7eb;
        --pink: #ec4899;
        --pink-dark: #db2777;
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
        background: var(--bg);
        color: var(--text);
        padding: 24px;
      }

      .page {
        max-width: 1220px;
        margin: 0 auto;
      }

      .title {
        margin: 0 0 8px;
        font-size: 26px;
        font-weight: 700;
      }

      .subtitle {
        margin: 0 0 20px;
        font-size: 14px;
        color: var(--muted);
      }

      .layout {
        display: grid;
        grid-template-columns: 320px minmax(0, 1fr);
        gap: 0;
        border: 1px solid var(--border);
        border-radius: 14px;
        overflow: hidden;
        background: var(--panel);
      }

      .sidebar {
        border-right: 1px solid var(--border);
        background: #fafafa;
      }

      .sidebar-header {
        padding: 18px 18px 10px;
        font-size: 13px;
        color: var(--muted);
      }

      .provider-list {
        padding: 4px 8px 12px;
        max-height: 760px;
        overflow: auto;
      }

      .provider-item {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        width: 100%;
        border: none;
        border-radius: 10px;
        background: transparent;
        padding: 10px 12px;
        margin-bottom: 4px;
        cursor: pointer;
        text-align: left;
      }

      .provider-item:hover {
        background: #f3f4f6;
      }

      .provider-item.active {
        background: #fff1f8;
      }

      .provider-name {
        font-size: 15px;
      }

      .switch {
        width: 36px;
        height: 20px;
        border-radius: 999px;
        background: #d1d5db;
        position: relative;
        flex: 0 0 auto;
        transition: 0.2s;
      }

      .switch::after {
        content: "";
        width: 14px;
        height: 14px;
        border-radius: 50%;
        background: #fff;
        position: absolute;
        left: 3px;
        top: 3px;
        transition: 0.2s;
      }

      .provider-item.active .switch {
        background: var(--pink);
      }

      .provider-item.active .switch::after {
        left: 19px;
      }

      .content {
        padding: 20px 24px 18px;
      }

      .content-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 14px;
      }

      h2 {
        margin: 0;
        font-size: 30px;
      }

      .provider-tip {
        font-size: 13px;
        color: var(--muted);
        margin: 2px 0 0;
      }

      .link {
        color: var(--pink-dark);
        text-decoration: none;
        font-size: 14px;
      }

      .link:hover {
        text-decoration: underline;
      }

      .section {
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 12px;
      }

      .section h3 {
        margin: 0 0 14px;
        font-size: 16px;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        color: #374151;
      }

      input,
      select,
      textarea {
        width: 100%;
        border: 1px solid #cbd5e1;
        border-radius: 8px;
        background: #fff;
        color: #111827;
        padding: 10px;
        margin-bottom: 10px;
        font-size: 13px;
      }
      option {
        color: #111827;
        background: #ffffff;
      }

      textarea {
        min-height: 78px;
        resize: vertical;
      }

      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .inline-check {
        display: flex;
        align-items: center;
        gap: 8px;
        margin: 4px 0 10px;
      }

      .inline-check input {
        width: auto;
        margin: 0;
      }

      .actions {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-top: 14px;
      }

      button {
        border: none;
        border-radius: 10px;
        padding: 10px 14px;
        background: linear-gradient(135deg, #ec4899, #a855f7);
        color: white;
        font-weight: 600;
        cursor: pointer;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }

      #msg {
        font-size: 14px;
        color: #16a34a;
      }

      .test-row {
        display: flex;
        gap: 10px;
        align-items: center;
        margin-top: 8px;
      }

      .test-result {
        font-size: 13px;
        color: var(--muted);
      }

      @media (max-width: 920px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          border-right: none;
          border-bottom: 1px solid var(--border);
        }

        .provider-list {
          max-height: 230px;
        }

        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="page">
      <h1 class="title">翻译服务列表</h1>
      <p class="subtitle">布局参考沉浸式翻译：左侧选择服务，右侧编辑对应配置。</p>

      <div class="layout">
        <aside class="sidebar">
          <div class="sidebar-header">翻译服务</div>
          <div id="providerList" class="provider-list"></div>
        </aside>

        <main class="content">
          <div class="content-top">
            <div>
              <h2 id="activeProviderTitle">Google</h2>
              <p class="provider-tip">可在下方配置接口地址、请求头和返回路径。</p>
            </div>
            <a class="link" href="#">点击测试服务</a>
          </div>

          <input id="translatorProvider" type="hidden" />

          <div class="section">
            <h3>通用语言</h3>
            <div class="row">
              <div>
                <label for="sourceLang">源语言</label>
                <input id="sourceLang" placeholder="auto / en / ja" />
              </div>
              <div>
                <label for="targetLang">目标语言</label>
                <input id="targetLang" placeholder="zh-CN" />
              </div>
            </div>
          </div>

          <div class="section" id="translateApiSection">
            <h3>翻译 API</h3>
            <p id="builtInProviderHint" class="provider-tip" style="display:none; margin-bottom:12px;">当前翻译源为内置免设置服务（谷歌/微软），无需填写下列接口参数。</p>
            <label for="providerEndpoint">接口链接</label>
            <input id="providerEndpoint" placeholder="https://..." />
            <div class="row">
              <div>
                <label for="providerApiKey">API Key</label>
                <input id="providerApiKey" type="password" placeholder="可选" />
              </div>
              <div id="modelFieldWrap">
                <label for="providerModel">模型</label>
                <select id="providerModelSelect"></select>
                <input id="providerModelCustom" placeholder="输入自定义模型名" style="display:none;" />
                <input id="providerModel" type="hidden" />
              </div>
            </div>
            <div class="test-row">
              <button id="testProviderBtn" type="button">连通性测试</button>
              <span id="testProviderResult" class="test-result"></span>
            </div>
            <hr style="border:none;border-top:1px solid var(--border);margin:14px 0;" />
            <label for="customTranslateEndpoint">自定义 API 接口地址</label>
            <input id="customTranslateEndpoint" placeholder="https://..." />
            <label for="customTranslateHeaders">自定义请求头（每行 Key: Value）</label>
            <textarea id="customTranslateHeaders"></textarea>
            <label for="customTranslateBody">自定义 Body 模板</label>
            <textarea id="customTranslateBody"></textarea>
            <label for="customTranslatePath">自定义 Response Path</label>
            <input id="customTranslatePath" placeholder="data.translation" />
          </div>

          <div class="section">
            <h3>OCR 源</h3>
            <label for="ocrProvider">OCR 提供方</label>
            <select id="ocrProvider">
              <option value="ocrspace">OCR.Space (默认)</option>
              <option value="baiduOcr">百度 OCR（内置）</option>
              <option value="custom">Custom</option>
            </select>
            <div id="ocrSpaceFields">
              <label for="ocrSpaceKey">OCR.Space Key</label>
              <input id="ocrSpaceKey" />
            </div>
            <div id="baiduOcrFields">
              <label for="baiduOcrEndpoint">百度 OCR 接口地址</label>
              <input id="baiduOcrEndpoint" placeholder="https://aip.baidubce.com/rest/2.0/ocr/v1/accurate" />
              <label for="baiduOcrToken">百度 OCR Access Token</label>
              <input id="baiduOcrToken" type="password" placeholder="填入 access_token" />
              <p class="provider-tip">优先使用 Access Token；若为空，将自动使用下方 API Key / Secret Key 换取 token。</p>
              <label for="baiduOcrApiKey">百度 OCR API Key（可选）</label>
              <input id="baiduOcrApiKey" type="password" placeholder="填入 API Key，用于自动换取 token" />
              <label for="baiduOcrSecretKey">百度 OCR Secret Key（可选）</label>
              <input id="baiduOcrSecretKey" type="password" placeholder="填入 Secret Key，用于自动换取 token" />
            </div>

            <div id="customOcrFields">
              <label for="customOcrEndpoint">Custom OCR Endpoint</label>
              <input id="customOcrEndpoint" placeholder="https://..." />
              <label for="customOcrHeaders">Custom OCR Headers</label>
              <textarea id="customOcrHeaders"></textarea>
              <label for="customOcrBody">Custom OCR Body Template</label>
              <textarea id="customOcrBody"></textarea>
              <label for="customOcrPath">Custom OCR Response Path（需返回数组）</label>
              <input id="customOcrPath" placeholder="data.lines" />
            </div>
            <div class="test-row">
              <button id="testOcrBtn" type="button">OCR 连通性测试</button>
              <span id="testOcrResult" class="test-result"></span>
            </div>
          </div>

          <div class="actions">
            <button id="saveBtn">保存设置</button><span id="msg"></span>
          </div>
        </main>
      </div>
    </div>

    <script type="module" src="options.js"></script>
  </body>
</html>
